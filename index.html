<title>For Phoebe, With Love</title>
<style>
  :root{
    --night-top:#241448;
    --night-mid:#43215e;
    --horizon:#84406f;
    --hill:#181026;
    --ink-soft:rgba(240,224,248,.72);
    --ink-faint:rgba(240,224,248,.45);
  }
  html,body{height:100%;}
  body{
    margin:0;
    overflow:hidden;
    background:var(--night-top);
    font-family:Georgia,'Times New Roman',serif;
  }
  canvas{display:block;position:fixed;inset:0;width:100%;height:100%;}
  .word{
    position:fixed;
    left:0;right:0;
    text-align:center;
    color:var(--ink-soft);
    pointer-events:none;
    -webkit-user-select:none;
    user-select:none;
  }
  h1.word{
    top:clamp(28px,7vh,72px);
    margin:0;
    font-style:italic;
    font-weight:400;
    font-size:clamp(22px,4.5vw,34px);
    letter-spacing:.04em;
    text-wrap:balance;
    text-shadow:0 2px 24px rgba(20,8,40,.8);
    opacity:0;
    animation:settle 2.4s ease .8s forwards;
  }
  p.sub{
    top:calc(clamp(28px,7vh,72px) + clamp(34px,6.5vw,50px));
    margin:0;
    font-style:italic;
    font-size:clamp(13px,3vw,17px);
    letter-spacing:.08em;
    color:rgba(255,196,222,.8);
    text-shadow:0 2px 18px rgba(20,8,40,.8);
    opacity:0;
    animation:settle 2.4s ease 1.6s forwards;
  }
  p.word{
    bottom:clamp(20px,5vh,48px);
    margin:0;
    font-size:clamp(12px,2.6vw,14px);
    font-style:italic;
    letter-spacing:.14em;
    color:var(--ink-faint);
    opacity:0;
    animation:settle 2.4s ease 2.2s forwards;
  }
  @keyframes settle{to{opacity:1}}
  @media (prefers-reduced-motion: reduce){
    h1.word,p.word,p.sub{animation:none;opacity:1}
  }
</style>

<canvas id="garden"></canvas>
<h1 class="word">phoebe, this garden is yours</h1>
<p class="word sub">every hydrangea here grew just for you &hearts;</p>
<p class="word">tap anywhere &mdash; i&rsquo;d plant you a thousand more</p>

<script>
(function(){
  'use strict';
  var canvas = document.getElementById('garden');
  var ctx = canvas.getContext('2d');
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var W = 0, H = 0, DPR = 1;
  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    if (reduceMotion) render(performance.now());
  }

  /* ---- hydrangea palettes: light + deep floret tones, pale eye ---- */
  var PALETTES = [
    { light:'#a8c8f8', deep:'#5d7fd4', eye:'#eef2cf' },  // nikko blue
    { light:'#b9c2f7', deep:'#6f79d8', eye:'#f2ecc9' },  // periwinkle
    { light:'#d3b3f0', deep:'#9a72cf', eye:'#f6e9d0' },  // lavender
    { light:'#f7bcd6', deep:'#dd7fae', eye:'#fdf0d2' },  // rose pink
    { light:'#c7e3f2', deep:'#8fb8dd', eye:'#e9f0c8' },  // powder blue
    { light:'#f3e9ef', deep:'#d5b9cf', eye:'#e4ecc4' }   // white annabelle
  ];
  /* lean pink and lavender — it's for her */
  var PALETTE_PICK = [3, 3, 3, 2, 2, 0, 1, 4, 5, 3];
  var HEART_COLORS = ['#ff9ec7', '#ffb3d9', '#ff7fb0'];
  var STEM_DARK = '#3e7c59', STEM_LIGHT = '#68b573';
  var LEAF_A = '#4e9b63', LEAF_B = '#37734c', LEAF_VEIN = 'rgba(220,240,210,.35)';
  var BUD_GREEN = '#7fae6f';

  var flowers = [];
  var driftingFlorets = [];
  var fireflies = [];
  var hearts = [];
  var MAX_FLOWERS = 18;
  var GOLDEN = 2.39996;

  function rand(a, b){ return a + Math.random() * (b - a); }
  function clamp01(t){ return t < 0 ? 0 : t > 1 ? 1 : t; }
  function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }
  function easeOutBack(t){
    var c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }

  function hexRGB(h){
    return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  }
  function mix(a, b, t){
    var A = hexRGB(a), B = hexRGB(b);
    return 'rgb(' + Math.round(A[0]+(B[0]-A[0])*t) + ',' +
                    Math.round(A[1]+(B[1]-A[1])*t) + ',' +
                    Math.round(A[2]+(B[2]-A[2])*t) + ')';
  }
  function withAlpha(hex, a){
    var c = hexRGB(hex);
    return 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + a + ')';
  }

  function plantFlower(x, headY, bornAt){
    var groundY = H * rand(0.90, 0.97);
    var h = headY !== null
      ? Math.min(Math.max(groundY - headY, H * 0.16), H * 0.6)
      : rand(H * 0.24, H * 0.5);
    var R = rand(26, 42) * (0.7 + h / (H * 0.6) * 0.55);
    var palette = PALETTES[PALETTE_PICK[Math.floor(Math.random() * PALETTE_PICK.length)]];

    /* mophead: florets packed on a slightly squashed disc, phyllotaxis spiral */
    var florets = [];
    var n = Math.round(R * 1.3);
    for (var i = 0; i < n; i++){
      var rr = R * Math.sqrt((i + 0.5) / n) * rand(0.94, 1.05);
      var aa = i * GOLDEN + rand(-0.15, 0.15);
      florets.push({
        x: Math.cos(aa) * rr,
        y: Math.sin(aa) * rr * 0.92,
        s: R * 0.22 * rand(0.85, 1.2),
        rot: rand(0, Math.PI / 2),
        color: mix(palette.light, palette.deep, rand(0, 0.9)),
        delay: (rr / R) * 0.55 + rand(0, 0.1)   // blooms from the heart outward
      });
    }

    flowers.push({
      x: x, groundY: groundY, h: h, R: R,
      lean: rand(-24, 24),
      phase: rand(0, Math.PI * 2),
      swaySpeed: rand(0.4, 0.75),
      swayAmp: rand(0.015, 0.04),
      palette: palette,
      florets: florets,
      born: bornAt,
      growDur: reduceMotion ? 0 : rand(2200, 3200),
      leafT: [rand(0.3, 0.42), rand(0.58, 0.7)],
      leafSide: Math.random() < 0.5 ? 1 : -1,
      sprite: null, spritePad: 0
    });
    if (flowers.length > MAX_FLOWERS) flowers.shift();
    flowers.sort(function(a, b){ return a.groundY - b.groundY; });
  }

  function qPoint(t, x0, y0, cx, cy, x1, y1){
    var u = 1 - t;
    return [
      u * u * x0 + 2 * u * t * cx + t * t * x1,
      u * u * y0 + 2 * u * t * cy + t * t * y1
    ];
  }

  /* one hydrangea floret: four rounded petals and a pale eye */
  function drawFloret(c, s, rot, color, eye){
    c.save();
    c.rotate(rot);
    c.fillStyle = color;
    for (var k = 0; k < 4; k++){
      var a = k * Math.PI / 2;
      c.beginPath();
      c.ellipse(Math.cos(a) * s * 0.55, Math.sin(a) * s * 0.55,
                s * 0.5, s * 0.36, a, 0, Math.PI * 2);
      c.fill();
    }
    c.fillStyle = eye;
    c.beginPath();
    c.arc(0, 0, s * 0.18, 0, Math.PI * 2);
    c.fill();
    c.restore();
  }

  function heartPath(c, s){
    c.beginPath();
    c.moveTo(0, s * 0.32);
    c.bezierCurveTo(-s * 1.05, -s * 0.4, -s * 0.42, -s * 1.15, 0, -s * 0.45);
    c.bezierCurveTo(s * 0.42, -s * 1.15, s * 1.05, -s * 0.4, 0, s * 0.32);
    c.closePath();
  }

  function spawnHeart(x, y, burst){
    hearts.push({
      x: x, y: y,
      vx: burst ? rand(-1.6, 1.6) : rand(-0.15, 0.15),
      vy: burst ? rand(-2.4, -0.6) : rand(-0.5, -0.3),
      s: burst ? rand(3, 6) : rand(4, 8),
      rot: rand(-0.4, 0.4), vr: rand(-0.02, 0.02),
      life: 1, decay: burst ? 0.014 : 0.0022,
      gravity: burst ? 0.045 : 0,
      phase: rand(0, Math.PI * 2),
      color: HEART_COLORS[Math.floor(Math.random() * HEART_COLORS.length)]
    });
  }

  function drawHearts(now){
    for (var i = hearts.length - 1; i >= 0; i--){
      var p = hearts[i];
      p.x += p.vx + Math.sin(now / 800 + p.phase) * 0.35;
      p.vy += p.gravity;
      p.y += p.vy;
      p.rot += p.vr;
      p.life -= p.decay;
      if (p.life <= 0 || p.y < -20 || p.y > H + 20){ hearts.splice(i, 1); continue; }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot + Math.sin(now / 600 + p.phase) * 0.12);
      ctx.globalAlpha = Math.min(p.life * 1.4, 1) * 0.9;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 10;
      heartPath(ctx, p.s);
      ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  function drawLeaf(len){
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(len * 0.3, -len * 0.5, len * 0.8, -len * 0.46, len, 0);
    ctx.bezierCurveTo(len * 0.8, len * 0.26, len * 0.3, len * 0.3, 0, 0);
    ctx.fill();
    ctx.strokeStyle = LEAF_VEIN;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(len * 0.08, 0);
    ctx.lineTo(len * 0.9, -len * 0.02);
    ctx.stroke();
  }

  /* render the finished head once, then stamp it every frame */
  function buildSprite(f){
    var pad = 34;
    var size = (f.R + pad) * 2;
    var oc = document.createElement('canvas');
    oc.width = oc.height = Math.ceil(size * DPR);
    var c = oc.getContext('2d');
    c.setTransform(DPR, 0, 0, DPR, 0, 0);
    c.translate(f.R + pad, f.R + pad);

    var glow = c.createRadialGradient(0, 0, f.R * 0.2, 0, 0, f.R * 1.45);
    glow.addColorStop(0, withAlpha(f.palette.deep, 0.4));
    glow.addColorStop(1, withAlpha(f.palette.deep, 0));
    c.fillStyle = glow;
    c.beginPath();
    c.arc(0, 0, f.R * 1.45, 0, Math.PI * 2);
    c.fill();

    for (var i = 0; i < f.florets.length; i++){
      var p = f.florets[i];
      c.save();
      c.translate(p.x, p.y);
      drawFloret(c, p.s, p.rot, p.color, f.palette.eye);
      c.restore();
    }
    f.sprite = oc;
    f.spritePad = pad;
    f.spriteSize = size;
  }

  function drawFlower(f, now){
    var age = now - f.born;
    var grow = f.growDur === 0 ? 1 : Math.min(age / f.growDur, 1);
    var stemP = easeOutCubic(Math.min(grow / 0.75, 1));
    var bloomRaw = clamp01((grow - 0.55) / 0.45);

    var sway = reduceMotion ? 0
      : Math.sin(now / 1000 * f.swaySpeed + f.phase) * f.swayAmp;

    var x0 = f.x, y0 = f.groundY;
    var tipX = f.x + f.lean + sway * f.h;
    var tipY = f.groundY - f.h * stemP;
    var cx = f.x + f.lean * 0.25, cy = f.groundY - f.h * stemP * 0.5;

    /* stem — hydrangeas have sturdy woody stems */
    ctx.strokeStyle = STEM_DARK;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.quadraticCurveTo(cx, cy, tipX, tipY);
    ctx.stroke();
    ctx.strokeStyle = STEM_LIGHT;
    ctx.lineWidth = 1.4;
    ctx.stroke();

    /* broad leaves in near-opposite pairs */
    for (var li = 0; li < 2; li++){
      var lt = f.leafT[li];
      if (stemP < lt + 0.08) continue;
      var lp = qPoint(lt, x0, y0, cx, cy, tipX, tipY);
      var leafGrow = Math.min((stemP - lt) / 0.25, 1);
      var side = li === 0 ? f.leafSide : -f.leafSide;
      ctx.save();
      ctx.translate(lp[0], lp[1]);
      ctx.rotate(side * (-0.45 + sway * 2) + (side < 0 ? Math.PI : 0));
      ctx.scale(side * leafGrow, leafGrow);
      ctx.fillStyle = li === 0 ? LEAF_A : LEAF_B;
      drawLeaf(f.R * 1.15);
      ctx.restore();
    }

    var headOffset = -f.R * 0.55;

    /* green bud cluster before the florets open */
    if (bloomRaw <= 0.01){
      if (stemP > 0.35){
        ctx.save();
        ctx.translate(tipX, tipY - 6 * stemP);
        ctx.fillStyle = BUD_GREEN;
        for (var b = 0; b < 5; b++){
          var ba = (b / 5) * Math.PI * 2;
          ctx.beginPath();
          ctx.arc(Math.cos(ba) * 3.5 * stemP, Math.sin(ba) * 3 * stemP, 3 * stemP, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
      return;
    }

    ctx.save();
    ctx.translate(tipX, tipY);
    ctx.rotate(sway * 1.2);

    if (grow >= 1){
      /* fully bloomed: stamp the pre-rendered head */
      if (!f.sprite) buildSprite(f);
      ctx.drawImage(f.sprite,
        -f.R - f.spritePad, headOffset - f.R - f.spritePad,
        f.spriteSize, f.spriteSize);
    } else {
      /* blooming: florets pop open one by one, heart first */
      ctx.translate(0, headOffset);
      for (var i = 0; i < f.florets.length; i++){
        var p = f.florets[i];
        var fp = clamp01((bloomRaw - p.delay) / 0.35);
        if (fp <= 0) continue;
        var pop = easeOutBack(fp);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.scale(pop, pop);
        drawFloret(ctx, p.s, p.rot, p.color, f.palette.eye);
        ctx.restore();
      }
    }
    ctx.restore();

    /* shed a floret now and then */
    if (!reduceMotion && grow >= 1 && driftingFlorets.length < 40 && Math.random() < 0.0025){
      var shed = f.florets[Math.floor(Math.random() * f.florets.length)];
      driftingFlorets.push({
        x: tipX + shed.x, y: tipY + headOffset + shed.y,
        vx: rand(-0.2, 0.45), vy: rand(0.2, 0.5),
        rot: rand(0, Math.PI * 2), vr: rand(-0.03, 0.03),
        s: shed.s * 0.9, color: shed.color, eye: f.palette.eye,
        life: 1, phase: rand(0, Math.PI * 2)
      });
    }
  }

  function drawSky(now){
    var sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#241448');
    sky.addColorStop(0.55, '#43215e');
    sky.addColorStop(0.85, '#84406f');
    sky.addColorStop(1, '#5b2c55');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    var glow = ctx.createRadialGradient(W * 0.5, H * 0.95, 0, W * 0.5, H * 0.95, W * 0.7);
    glow.addColorStop(0, 'rgba(255,180,140,.18)');
    glow.addColorStop(1, 'rgba(255,180,140,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);

    /* a blushing rose moon */
    var mx = W * 0.8, my = H * 0.2, mr = Math.min(W, H) * 0.075;
    var halo = ctx.createRadialGradient(mx, my, mr * 0.4, mx, my, mr * 3.4);
    halo.addColorStop(0, 'rgba(255,190,215,.32)');
    halo.addColorStop(1, 'rgba(255,190,215,0)');
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(mx, my, mr * 3.4, 0, Math.PI * 2);
    ctx.fill();
    var moon = ctx.createRadialGradient(mx - mr * 0.3, my - mr * 0.3, mr * 0.1, mx, my, mr);
    moon.addColorStop(0, '#fff2f6');
    moon.addColorStop(1, '#ffd3e2');
    ctx.fillStyle = moon;
    ctx.beginPath();
    ctx.arc(mx, my, mr, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#181026';
    ctx.beginPath();
    ctx.moveTo(0, H * 0.92);
    ctx.quadraticCurveTo(W * 0.5, H * 0.86, W, H * 0.92);
    ctx.lineTo(W, H); ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();
  }

  function drawFireflies(now, front){
    for (var i = 0; i < fireflies.length; i++){
      var p = fireflies[i];
      if (p.front !== front) continue;
      var t = now / 1000;
      var fx = p.x * W + Math.sin(t * p.sx + p.phase) * 30;
      var fy = p.y * H + Math.cos(t * p.sy + p.phase) * 22;
      var tw = 0.5 + 0.5 * Math.sin(t * p.tw + p.phase * 3);
      ctx.globalAlpha = 0.25 + 0.55 * tw;
      ctx.fillStyle = '#ffe9a8';
      ctx.shadowColor = '#ffd97a';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(fx, fy, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  function drawDrifting(now){
    for (var i = driftingFlorets.length - 1; i >= 0; i--){
      var p = driftingFlorets[i];
      p.x += p.vx + Math.sin(now / 900 + p.phase) * 0.55;
      p.y += p.vy;
      p.rot += p.vr;
      p.life -= 0.002;
      if (p.life <= 0 || p.y > H + 20){ driftingFlorets.splice(i, 1); continue; }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.globalAlpha = Math.min(p.life, 1) * 0.9;
      drawFloret(ctx, p.s, p.rot, p.color, p.eye);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function render(now){
    drawSky(now);
    drawFireflies(now, false);
    for (var i = 0; i < flowers.length; i++) drawFlower(flowers[i], now);
    drawDrifting(now);

    /* the garden breathes out little hearts */
    if (!reduceMotion && hearts.length < 12 && Math.random() < 0.012){
      var host = flowers[Math.floor(Math.random() * flowers.length)];
      if (host && now - host.born > host.growDur){
        spawnHeart(host.x + host.lean + rand(-host.R, host.R),
                   host.groundY - host.h - host.R * rand(0.6, 1.2), false);
      }
    }
    drawHearts(now);
    drawFireflies(now, true);

    var v = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.35, W / 2, H / 2, Math.max(W, H) * 0.75);
    v.addColorStop(0, 'rgba(10,5,20,0)');
    v.addColorStop(1, 'rgba(10,5,20,.38)');
    ctx.fillStyle = v;
    ctx.fillRect(0, 0, W, H);
  }

  function loop(now){
    render(now);
    requestAnimationFrame(loop);
  }

  /* ---- setup ---- */
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < 26; i++){
    fireflies.push({
      x: Math.random(), y: rand(0.15, 0.85),
      sx: rand(0.05, 0.2), sy: rand(0.05, 0.18),
      tw: rand(0.8, 2.2), r: rand(0.8, 1.8),
      phase: rand(0, Math.PI * 2),
      front: Math.random() < 0.4
    });
  }

  var t0 = performance.now();
  var starters = 6;
  for (var k = 0; k < starters; k++){
    var sx = W * (0.1 + 0.8 * (k / (starters - 1))) + rand(-W * 0.04, W * 0.04);
    plantFlower(sx, null, reduceMotion ? t0 : t0 + 400 + k * rand(400, 700));
  }

  canvas.addEventListener('pointerdown', function(e){
    var x = Math.min(Math.max(e.clientX, 20), W - 20);
    plantFlower(x, e.clientY, performance.now());
    if (!reduceMotion){
      for (var hb = 0; hb < 6; hb++) spawnHeart(e.clientX, e.clientY, true);
    }
    if (reduceMotion) render(performance.now());
  });

  if (reduceMotion){
    render(performance.now());
  } else {
    requestAnimationFrame(loop);
  }
})();
</script>
